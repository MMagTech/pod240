# Self-contained Windows + macOS builds (vendors HandBrake CLI + AtomicParsley before tauri build).
# Trigger: push version tag, e.g. git tag v0.1.0 && git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Vendor HandBrake CLI + AtomicParsley
        run: node scripts/vendor-release-assets.mjs

      - name: Install Rust stable (Windows)
        if: matrix.platform == 'windows-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable (macOS)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: Pod240 ${{ github.ref_name }}
          releaseBody: |
            Self-contained installers (HandBrake CLI and AtomicParsley are bundled). **Unsigned** — Windows SmartScreen and macOS Gatekeeper may warn; use “More info” / right‑click → Open if needed.

            See the repository README for development setup.
          generateReleaseNotes: true
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
